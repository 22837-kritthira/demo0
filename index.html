<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว - น้องการ์ตูน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;500;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f9f9f9 0%, #ffebee 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Card Container */
        .profile-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(239, 83, 80, 0.15);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Header / Cover Area */
        .profile-header {
            background: linear-gradient(135deg, #ff5252, #ff1744);
            height: 140px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        /* Avatar */
        .avatar-container {
            position: absolute;
            bottom: -50px;
            background: #ffffff;
            padding: 6px;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .avatar-placeholder {
            width: 100px;
            height: 100px;
            background-color: #ffebee;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff5252;
            font-size: 2.5rem;
        }

        /* Content Area */
        .profile-body {
            padding: 70px 30px 40px 30px;
            text-align: center;
        }

        h1 {
            font-family: 'Mitr', sans-serif;
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .nickname {
            font-size: 1.1rem;
            color: #ff5252;
            font-weight: 600;
            margin-bottom: 25px;
            background: #ffebee;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
